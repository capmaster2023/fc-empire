pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

// Capacitor's Android module declares its own repositories.
// FAIL_ON_PROJECT_REPOS breaks GitHub Actions because @capacitor/android/capacitor/build.gradle adds google()/mavenCentral().
// PREFER_PROJECT keeps Capacitor compatible instead of turning Gradle into a courtroom drama.
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_PROJECT)
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

rootProject.name = 'Football Empire'
include ':app'
include ':capacitor-android'
project(':capacitor-android').projectDir = new File('../node_modules/@capacitor/android/capacitor')
include ':capacitor-cordova-android-plugins'
project(':capacitor-cordova-android-plugins').projectDir = new File('./capacitor-cordova-android-plugins/')
