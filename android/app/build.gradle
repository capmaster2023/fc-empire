plugins { id 'com.android.application' }

android {
    namespace 'com.capmaster2023.footballempire'
    compileSdk 35
    ndkVersion '26.1.10909125'

    defaultConfig {
        applicationId 'com.capmaster2023.footballempire'
        minSdk 23
        targetSdk 35
        versionCode 10401
        versionName '1.4.2-native-match'
        externalNativeBuild {
            cmake {
                cppFlags '-std=c++17 -fexceptions -frtti -O2'
                arguments '-DANDROID_STL=c++_shared'
            }
        }
    }

    externalNativeBuild {
        cmake {
            path file('src/main/cpp/CMakeLists.txt')
            version '3.22.1'
        }
    }

    packagingOptions {
        resources.excludes += ['META-INF/DEPENDENCIES', 'META-INF/LICENSE', 'META-INF/LICENSE.txt', 'META-INF/NOTICE', 'META-INF/NOTICE.txt']
    }
}

dependencies {
    implementation project(':capacitor-android')
    implementation 'androidx.appcompat:appcompat:1.7.0'
}
